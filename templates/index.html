<!DOCTYPE html>
<html>
<head>
    <title>Product Browser</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .controls {
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        .next-btn {
            margin-top: 20px;
            text-align: center;
        }

    </style>
</head>

<body>

    <h1>Product Browser</h1>

    <div class="controls">

        <input
            id="category"
            placeholder="Electronics / Fashion / Books"
        >

        <button onclick="loadProducts(true)">
            Search
        </button>

    </div>

    <table>

        <thead>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
            </tr>

        </thead>

        <tbody id="products">

        </tbody>

    </table>

    <div class="next-btn">

        <button onclick="loadProducts(false)">
            Next Page
        </button>

    </div>

<script>

let cursor = null;

async function loadProducts(reset=false) {

    if(reset){
        cursor = null;
    }

    let category =
        document.getElementById("category").value;

    let url = "/products";

    let params = [];

    if(category){
        params.push("category=" + category);
    }

    if(cursor){
        params.push("cursor=" + cursor);
    }

    if(params.length > 0){
        url += "?" + params.join("&");
    }

    const response = await fetch(url);

    const data = await response.json();

    const table =
        document.getElementById("products");

    table.innerHTML = "";

    data.forEach(product => {

        cursor = product.id;

        table.innerHTML += `
            <tr>
                <td>${product.id}</td>
                <td>${product.name}</td>
                <td>${product.category}</td>
                <td>${product.price}</td>
            </tr>
        `;
    });
}

loadProducts();

</script>

</body>
</html>
